<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeseoTicket</title>
    <link rel="icon" href="/IMG/MT-ICON.png">
    <style>
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: #294886;
            color: #fff;
            padding: 16px;
            text-align: center;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        .logo {
            color: black;
            margin-left: 25px;
            font-size: 25px;
        }

        .log {
            display: flex;
            right: 0;
            margin-right: 20px;
        }

        .log button {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-weight: 500;
            font-size: 20px;
            color: #edf0f1;
            text-decoration: none;
            padding: 9px 25px;
            background-color: #5102a0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease 0s;
        }

        .log button:hover {
            background-color: #119a01;
        }

        nav {
            background: linear-gradient(120deg,#f8c390, #d279ee);
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
        }

        nav ul {
            width: 90%;
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        nav li {
            display: inline-block;
            margin: 0 16px;
            font-size: 20px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
        }

        nav a:hover {
            color: #500460;
        }

        main {
            max-width: 400px;
            margin: 32px auto;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        main form {
            display: inline-block;
            text-align: left;
        }

        input[type="submit"] {
            background-color: #2691d9;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease 0s;
        }

        input[type="submit"]:hover {
            background-color: #119a01;
        }

         footer {
            text-align: center;
            padding: 16px;
            background: linear-gradient(120deg,#f8c390, #d279ee);
            color: #fff;
        }
    </style>
</head>

<body>
    <header>
        <h3>"Museums are not mere structures; they are living evidences to the beauty of history, the perseverance of civilizations, and the power of human creativity."</h3>
    </header>
    <nav>
        <text class="logo">MeseoTicket</text>
        <ul class="nav_links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">My Tickets</a></li>
            <li><a href="contact_out.html">Contact</a></li>
        </ul>
        <a class="log" href="login.html"><button>Login</button></a>
    </nav>

    <main>
        <h2>Send us a message</h2>
        <form action="#" method="post">
            <label for="name">Your Name :</label><br>
            <input type="text" id="name" name="name" required><br><br><br>
            <label for="email">Your Email :</label><br>
            <input type="email" id="email" name="email" required><br><br><br>
            <label for="message">Your Message :</label><br>
            <textarea id="message" name="message" rows="4" required></textarea><br><br><br>
            <input type="submit" value="Send Message">
        </form>
    </main>

    <footer>
        <p>Copyright &copy; 2023 - 2024 MeseoTicket. All Rights Reserved.</p>
    </footer>
</body>
</html>
